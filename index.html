// 粒子
const pts=[];
class Pt{constructor(x,y,c){this.x=x;this.y=y;const a=Math.random()*Math.PI*2,s=30+Math.random()*250;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;this.l=.25+Math.random()*.8;this.ml=this.l;this.c=c;this.sz=1+Math.random()*5}up(dt){this.l-=dt;this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=.94;this.vy*=.94}get a(){return this.l>0}dr(C){C.globalAlpha=this.l/this.ml;C.fillStyle=this.c;C.fillRect(this.x-this.sz/2,this.y-this.sz/2,this.sz,this.sz);C.globalAlpha=1}}
function sEx(x,y,n=15){const cs=['#500','#800','#a20','#200','#100','#030'];for(let i=0;i<n;i++)pts.push(new Pt(x,y,cs[Math.floor(Math.random()*cs.length)]))}
function sSm(x,y,n=6){for(let i=0;i<n;i++)pts.push(new Pt(x,y,'#600'))}
function sBl(x,y){for(let i=0;i<8;i++){const p=new Pt(x,y,'#800');p.vy-=30;pts.push(p)}}

// 子弹
class Bl{constructor(x,y,dir,ow){this.x=x;this.y=y;this.dir=dir;this.ow=ow;this.a=true}
  up(dt){this.x+=DX[this.dir]*BLspd*dt;this.y+=DY[this.dir]*BLspd*dt;if(this.x<GX-10||this.x>GX+CLS*CL+10||this.y<GY-10||this.y>GY+RWS*CL+10){this.a=false;return}const cl=getC(this.x,this.y);if(cl){if(cl.v===1){walls[cl.r][cl.c]=0;sSm(GX+cl.c*CL+CL/2,GY+cl.r*CL+CL/2);this.a=false;sfxH();return}if(cl.v===2){sSm(this.x,this.y,3);this.a=false;sfxH();return}if(cl.v>=3){hB(cl,this);return}}}
  dr(C){const ip=typeof this.ow==='number';C.fillStyle=ip?'#f40':'#a00';C.shadowColor=ip?'#f60':'#400';C.shadowBlur=10;C.beginPath();C.arc(this.x,this.y,BR,0,Math.PI*2);C.fill();C.shadowBlur=0}}

function hB(cl,bl){if(gm==='versus'){if(cl.v===3&&typeof bl.ow==='number'&&bl.ow===1)return;if(cl.v===4&&typeof bl.ow==='number'&&bl.ow===2)return}walls[cl.r][cl.c]=0;bl.a=false;sEx(GX+cl.c*CL+CL/2,GY+cl.r*CL+CL/2,30);sfxEx();if(gs!=='playing')return;if(gm==='versus'){if(cl.v===3)vW(2);if(cl.v===4)vW(1)}else go('base')}

// 道具
const PD={heart:{ic:'💉',lb:'血肉',cl:'#c00'},speed:{ic:'👁️',lb:'窥视',cl:'#f0f'},rapid:{ic:'🩸',lb:'血怒',cl:'#f00'},shield:{ic:'🕸️',lb:'蛛网',cl:'#60f'},bomb:{ic:'💀',lb:'湮灭',cl:'#f60'},freeze:{ic:'🧊',lb:'冰棺',cl:'#0af'}};
class PU{constructor(x,y,tp){this.x=x;this.y=y;this.tp=tp;this.lf=18;this.a=true;this.ps=0}up(dt){this.lf-=dt;this.ps+=dt*4;if(this.lf<=0)this.a=false}
  dr(C){if(!this.a)return;const p=Math.sin(this.ps)*5,r=18+p;C.fillStyle=PD[this.tp].cl+'22';C.beginPath();C.arc(this.x,this.y,r+10,0,Math.PI*2);C.fill();C.fillStyle='#050005';C.beginPath();C.arc(this.x,this.y,r,0,Math.PI*2);C.fill();C.strokeStyle=PD[this.tp].cl;C.lineWidth=3;C.beginPath();C.arc(this.x,this.y,r,0,Math.PI*2);C.stroke();C.font=`${16+p/2}px sans-serif`;C.textAlign='center';C.textBaseline='middle';C.fillText(PD[this.tp].ic,this.x,this.y);C.textAlign='start';C.textBaseline='alphabetic'}}

function rPU(){const cs=[];for(let r=0;r<RWS;r++)for(let c=0;c<CLS;c++){if(walls[r][c]!==0)continue;const cx=GX+c*CL+CL/2,cy=GY+r*CL+CL/2;let tc=false;for(const t of aT()){if(Math.abs(t.x-cx)<CL&&Math.abs(t.y-cy)<CL){tc=true;break}}if(!tc)cs.push({x:cx,y:cy})}if(!cs.length)return;const p=cs[Math.floor(Math.random()*cs.length)];return new PU(p.x,p.y,['heart','speed','rapid','shield','bomb','freeze'][Math.floor(Math.random()*6)])}
function aPU(tk,tp){switch(tp){case'heart':tk.hp=Math.min(tk.mhp,tk.hp+1);break;case'speed':tk._ps=8;break;case'rapid':tk._pr=8;break;case'shield':tk._psh=6;tk.inv=6;break;case'bomb':if(gm!=='versus'){for(const e of enemies)if(e.a){e.hp=0;e.a=false;sEx(e.x,e.y,18)}if(bo&&bo.a){bo.hp-=5;sEx(bo.x,bo.y,25)}sfxBm()}break;case'freeze':for(const e of enemies)if(e.a)e._fz=(e._fz||0)+5;if(bo&&bo.a)bo._fz=(bo._fz||0)+2;break}sfxPk()}

// ═══════════════ 恐怖坦克 ═══════════════
class Tk{
  constructor(x,y,dir,ip,pid,hp=1,et='n'){
    this.x=x;this.y=y;this.dir=dir;this.ip=ip;this.pid=pid;this.a=true;this.hp=hp;this.mhp=hp;this.et=et;
    const bs=et==='fa'?160:et==='hv'?70:ip?PSpd:ESpd;
    this.spd=bs;this.scd=0;this.sd=ip?.35:et==='fa'?.6:et==='hv'?1.8:1.2;
    this.inv=0;this.bt=0;this.mt=.8+Math.random()*1.5;this.at=.5+Math.random()*1.5;
    this._ps=0;this._pr=0;this._psh=0;this._fz=0;
    this.ib=false;this.bsT=0;this.bsI=0;this.sz=TS;this.eg=0;this.drip=0;
  }
  get eSpd(){return this._ps>0?this.spd*2:this.spd}
  get eSD(){return this._pr>0?this.sd*.45:this.sd}
  clAt(nx,ny,ig=true){
    const h=this.sz/2,l=nx-h,r=nx+h,t=ny-h,b=ny+h;
    if(l<GX||r>GX+CLS*CL||t<GY||b>GY+RWS*CL)return true;
    const c1=Math.floor((l-GX)/CL),c2=Math.floor((r-1-GX)/CL),r1=Math.floor((t-GY)/CL),r2=Math.floor((b-1-GY)/CL);
    for(let rr=Math.max(0,r1);rr<=Math.min(RWS-1,r2);rr++)for(let cc=Math.max(0,c1);cc<=Math.min(CLS-1,c2);cc++)if(walls[rr][cc]!==0)return true;
    if(ig){for(const o of aT()){if(o===this||!o.a)continue;if(Math.abs(nx-o.x)<(this.sz+o.sz)/2&&Math.abs(ny-o.y)<(this.sz+o.sz)/2)return true}}
    return false
  }
  tM(dx,dy){const nx=this.x+dx,ny=this.y+dy;if(!this.clAt(nx,ny)){this.x=nx;this.y=ny;return true}if(!this.clAt(nx,this.y)){this.x=nx;return true}if(!this.clAt(this.x,ny)){this.y=ny;return true}return false}
  up(dt){if(!this.a)return;this.eg+=dt*5;this.drip+=dt;if(this.scd>0)this.scd-=dt;if(this._ps>0)this._ps-=dt;if(this._pr>0)this._pr-=dt;if(this._psh>0){this._psh-=dt;if(this._psh<=0)this.inv=0}if(this._fz>0)this._fz-=dt;if(this.inv>0){this.inv-=dt;this.bt+=dt}}
  sht(){if(this.scd>0)return null;this.scd=this.eSD;const ox=DX[this.dir]*(this.sz/2+BR+2),oy=DY[this.dir]*(this.sz/2+BR+2);const ow=this.ib?'boss':this.ip?this.pid:'enemy';return new Bl(this.x+ox,this.y+oy,this.dir,ow)}

  // ═════ 真实恐怖绘制 ═════
  dr(C){
    if(!this.a)return;if(this.inv>0&&Math.floor(this.bt*8)%2===0)return;
    const s=this.sz/2;
    C.save();C.translate(this.x,this.y);

    // ══ 血肉履带 —— 像剥了皮的肌肉和暴露的脊椎 ══
    this._drawTreads(C,s);

    // ══ 车体 —— 生物机械混合体 ══
    this._drawBody(C,s);

    // ══ 炮塔 —— 真实的恐怖头部 ══
    this._drawTurret(C,s);

    C.restore();

    // 护盾——蛛网茧
    if(this._psh>0){C.save();C.beginPath();C.arc(this.x,this.y,s+10,0,Math.PI*2);C.strokeStyle='rgba(80,0,200,.5)';C.lineWidth=4;C.setLineDash([8,4]);C.lineDashOffset=-performance.now()/20;C.stroke();C.setLineDash([]);for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.sin(performance.now()/1000)*.3;C.beginPath();C.moveTo(this.x,this.y);C.lineTo(this.x+Math.cos(a)*(s+12),this.y+Math.sin(a)*(s+12));C.strokeStyle='rgba(80,0,200,.25)';C.lineWidth=1;C.stroke()}C.restore()}

    // 血条
    if(this.mhp>1||this.ib)this._drHP(C);
  }

  _drawTreads(C,s){
    C.save();
    const segs=Math.floor(this.sz/7);
    for(let i=0;i<segs;i++){
      const t=i/(segs-1)-.5; // -0.5 to 0.5
      let px,py,w,h,rx,ry;
      if(this.dir===0||this.dir===2){px=-s;py=-s+i*7;w=this.sz;h=7} // 上下朝向坦克 — 水平履带段
      else{px=-s+i*7;py=-s;w=7;h=this.sz} // 左右朝向 — 垂直履带段

      // 暗色基底
      C.fillStyle='#0a0005';C.fillRect(px,py,w,h);

      // 脊椎骨节 - 白色骨节带裂纹
      const phase=Math.sin(i*1.2+this.eg*.3)*2;
      if(this.dir===0||this.dir===2){
        // 履带在左右两侧，脊椎在履带内侧
        // 左侧履带骨节
        const by=py+3,sz=6+phase;
        C.fillStyle='#c8b8a0';C.fillRect(-s+1,by,5,sz);
        C.fillStyle='#e8d8c0';C.fillRect(-s+2,by+1,2,sz-2);
        // 骨缝裂纹
        C.strokeStyle='#4a3020';C.lineWidth=.5;
        C.beginPath();C.moveTo(-s,by+sz/2);C.lineTo(-s+6,by+sz/2+Math.sin(i)*2);C.stroke();
        // 右侧履带骨节
        C.fillStyle='#c8b8a0';C.fillRect(s-6,by,5,sz);
        C.fillStyle='#e8d8c0';C.fillRect(s-5,by+1,2,sz-2);
        C.beginPath();C.moveTo(s,by+sz/2);C.lineTo(s-6,by+sz/2+Math.sin(i+2)*2);C.stroke();
      } else {
        const bx=px+3,sz=6+phase;
        C.fillStyle='#c8b8a0';C.fillRect(bx,-s+1,sz,5);
        C.fillStyle='#e8d8c0';C.fillRect(bx+1,-s+2,sz-2,2);
        C.strokeStyle='#4a3020';C.lineWidth=.5;
        C.beginPath();C.moveTo(bx+sz/2,-s);C.lineTo(bx+sz/2+Math.sin(i)*2,-s+6);C.stroke();
        C.fillStyle='#c8b8a0';C.fillRect(bx,s-6,sz,5);
        C.fillStyle='#e8d8c0';C.fillRect(bx+1,s-5,sz-2,2);
        C.beginPath();C.moveTo(bx+sz/2,s);C.lineTo(bx+sz/2+Math.sin(i+2)*2,s-6);C.stroke();
      }
    }

    // 履带外齿 —— 尖锐骨刺
    for(let i=-s+5;i<s-5;i+=10){
      const tilt=Math.sin(i*.5)*2;
      if(this.dir===0||this.dir===2){
        C.fillStyle='#8a6a50';C.beginPath();C.moveTo(-s-3,i-4+tilt);C.lineTo(-s-1,i);C.lineTo(-s-3,i+4+tilt);C.fill();
        C.fillStyle='#d4c4a8';C.beginPath();C.moveTo(-s-2,i-3+tilt);C.lineTo(-s-1,i);C.lineTo(-s-2,i+3+tilt);C.fill();
        C.fillStyle='#8a6a50';C.beginPath();C.moveTo(s+3,i-4-tilt);C.lineTo(s+1,i);C.lineTo(s+3,i+4-tilt);C.fill();
        C.fillStyle='#d4c4a8';C.beginPath();C.moveTo(s+2,i-3-tilt);C.lineTo(s+1,i);C.lineTo(s+2,i+3-tilt);C.fill();
      }else{
        C.fillStyle='#8a6a50';C.beginPath();C.moveTo(i-4+tilt,-s-3);C.lineTo(i,-s-1);C.lineTo(i+4+tilt,-s-3);C.fill();
        C.fillStyle='#d4c4a8';C.beginPath();C.moveTo(i-3+tilt,-s-2);C.lineTo(i,-s-1);C.lineTo(i+3+tilt,-s-2);C.fill();
        C.fillStyle='#8a6a50';C.beginPath();C.moveTo(i-4-tilt,s+3);C.lineTo(i,s+1);C.lineTo(i+4-tilt,s+3);C.fill();
        C.fillStyle='#d4c4a8';C.beginPath();C.moveTo(i-3-tilt,s+2);C.lineTo(i,s+1);C.lineTo(i+3-tilt,s+2);C.fill();
      }
    }
    C.restore();
  }

  _drawBody(C,s){
    C.save();
    // 底色 - 暗红血肉
    let bc,bd;
    if(this.ib){bc='#1a0005';bd='#0d0002'}
    else if(!this.ip){bc='#1a0205';bd='#0d0102'}
    else if(this.pid===1){bc='#0a1410';bd='#050a08'}
    else{bc='#0f0818';bd='#08040c'}

    const inner=s-6;
    C.fillStyle=bc;C.fillRect(-inner,-inner,this.sz-12,this.sz-12);

    // 血肉纹理——不规则暗斑和血管纹
    C.fillStyle=bd;
    C.fillRect(-inner+6,-inner+6,this.sz-24,this.sz-24);

    // 血管纹路
    C.strokeStyle='rgba(120,10,20,.4)';C.lineWidth=1.5;
    for(let i=0;i<5;i++){
      C.beginPath();
      const sx=-inner+8+i*12,sy=-inner+8;
      C.moveTo(sx,sy);
      C.bezierCurveTo(sx+Math.sin(i*2)*8,sy+10,sx+Math.cos(i)*8,sy+20,sx+Math.sin(i+.5)*6,sy+this.sz-28);
      C.stroke();
    }

    // 铆钉——像缝在肉上的金属钉
    const rivets=[[-inner+4,-inner+4],[inner-8,-inner+4],[-inner+4,inner-8],[inner-8,inner-8]];
    rivets.forEach(([rx,ry])=>{
      C.fillStyle='#333';C.beginPath();C.arc(rx+3,ry+3,5,0,Math.PI*2);C.fill();
      C.fillStyle='#555';C.beginPath();C.arc(rx+2,ry+2,3,0,Math.PI*2);C.fill();
      // 铆钉周围的血迹
      C.fillStyle='rgba(80,5,5,.5)';C.beginPath();C.arc(rx+3,ry+3,7,0,Math.PI*2);C.fill();
    });

    // 如果是敌人/Boss，添加缝合线
    if(!this.ip){
      C.strokeStyle='#1a0000';C.lineWidth=2;
      C.beginPath();C.moveTo(-inner+15,-inner+5);C.lineTo(-inner+15,inner-5);C.stroke();
      // 缝合针脚
      C.strokeStyle='#555';C.lineWidth=1;
      for(let j=-inner+8;j<inner-8;j+=10){
        C.beginPath();C.moveTo(-inner+12,j);C.lineTo(-inner+18,j+4);C.stroke();
      }
    }

    C.restore();
  }

  _drawTurret(C,s){
    C.save();
    const tr=s*.62;

    // ── 头部轮廓 —— 不规则的畸形的头骨 ──
    // 背面暗影
    C.fillStyle='#0a0000';C.beginPath();
    C.ellipse(1,-1,tr*1.05,tr*1.05,0,0,Math.PI*2);C.fill();

    // 主头骨 —— 苍白的黄褐色，带不规则凹凸
    C.fillStyle='#d4c4a0';
    if(this.ib)C.fillStyle='#c8a888';
    if(!this.ip&&!this.ib)C.fillStyle='#c4b490';

    C.beginPath();
    // 不规则圆形——模拟真实头骨形状
    const pts=16;
    for(let i=0;i<pts;i++){
      const a=i*Math.PI*2/pts;
      const wobble=1+Math.sin(i*2.3+1)*.08+Math.sin(i*3.7)*.05;
      const r=tr*wobble;
      C.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    C.closePath();C.fill();

    // 头骨裂纹
    C.strokeStyle='#8a7a60';C.lineWidth=.8;
    for(let i=0;i<5;i++){
      const sa=Math.random()*Math.PI*2;
      C.beginPath();C.moveTo(0,0);C.lineTo(Math.cos(sa)*tr*.9,Math.sin(sa)*tr*.9);C.stroke();
    }

    // ── 眼窝 —— 深陷的黑洞 ──
    const eR=tr*.24,eOX=tr*.34,eOY=-tr*.08;
    // 左眼窝
    C.fillStyle='#000';C.beginPath();C.ellipse(-eOX,eOY,eR*1.1,eR*.9,0,0,Math.PI*2);C.fill();
    // 右眼窝
    C.fillStyle='#000';C.beginPath();C.ellipse(eOX,eOY,eR*1.1,eR*.9,0,0,Math.PI*2);C.fill();

    // 眼窝边缘碎裂的骨头
    C.strokeStyle='#8a7a60';C.lineWidth=1;
    [-eOX,eOX].forEach(ex=>{
      C.beginPath();C.arc(ex,eOY,eR,0,Math.PI*2);C.stroke();
      // 裂缝从眼窝向外放射
      for(let j=0;j<3;j++){
        const ca=j*Math.PI*2/3-Math.PI/2;
        C.beginPath();C.moveTo(ex+Math.cos(ca)*eR,eOY+Math.sin(ca)*eR);
        C.lineTo(ex+Math.cos(ca)*eR*1.6,eOY+Math.sin(ca)*eR*1.6);C.stroke();
      }
    });

    // 发光瞳孔 —— 深渊中微弱的邪恶光芒
    const gl=Math.sin(this.eg)*.35+.65;
    const ec=this.ib?'#f20':this.ip?(this.pid===1?'#0a0':'#06f'):'#d00';
    [-eOX,eOX].forEach(ex=>{
      C.fillStyle=ec;C.shadowColor=ec;C.shadowBlur=5*gl;
      C.beginPath();C.arc(ex,eOY,eR*.35,0,Math.PI*2);C.fill();
      // 内瞳
      C.fillStyle='#000';C.shadowColor='transparent';C.shadowBlur=0;
      C.beginPath();C.arc(ex,eOY,eR*.12,0,Math.PI*2);C.fill();
    });
    C.shadowBlur=0;

    // ── 鼻腔 —— 塌陷的三角空洞 ──
    const ny=tr*.22;
    C.fillStyle='#000';C.beginPath();
    C.moveTo(-tr*.12,ny-tr*.08);C.lineTo(0,ny);C.lineTo(tr*.12,ny-tr*.08);
    C.lineTo(tr*.08,ny+tr*.08);C.lineTo(-tr*.08,ny+tr*.08);
    C.closePath();C.fill();
    C.strokeStyle='#7a6a50';C.lineWidth=.8;C.stroke();

    // ── 牙齿 —— 参差不齐的黄牙 ──
    const tY=ny+tr*.12,jw=tr*.18,jh=tr*.28;
    const teeth=[[-tr*.35,jw],[tr*.2,jw],[-tr*.08,jw*.7],[-tr*.25,jw*1.1]];
    teeth.forEach(([tx,tw])=>{
      C.fillStyle='#c8b880';C.fillRect(tx,tY,tw,jh);
      C.fillStyle='#e8d8a0';C.fillRect(tx+1,tY,2,jh);
      C.strokeStyle='#7a6a30';C.lineWidth=.5;
      C.beginPath();C.moveTo(tx,tY+jh);C.lineTo(tx+tw/2,tY);C.lineTo(tx+tw,tY+jh);C.stroke();
    });
    // 上方尖牙
    C.fillStyle='#c8b880';C.fillRect(-tr*.2,-tr*.05,jw*.8,-jh*.7);
    C.fillRect(tr*.08,-tr*.05,jw*.8,-jh*.7);

    // ── 血迹 —— 从嘴角/眼窝滴下 ──
    this._drawBlood(C,tr,eOX,eOY,ny);

    // ── 头骨顶部裂缝 (Boss更大更恐怖) ──
    if(this.ib){
      // 额外的不对称眼睛
      [[-tr*.5,-tr*.3],[tr*.45,-tr*.2],[0,-tr*.55]].forEach(([ex,ey])=>{
        C.fillStyle='#000';C.beginPath();C.arc(ex,ey,4,0,Math.PI*2);C.fill();
        C.fillStyle='#f20';C.shadowColor='#f20';C.shadowBlur=4; C.beginPath();C.arc(ex,ey,1.5,0,Math.PI*2);C.fill();C.shadowBlur=0;
      });
      // 扭曲的角
      C.fillStyle='#1a0000';
      C.save();C.rotate(-.35);C.beginPath();C.moveTo(-tr*.2,-tr*.9);C.quadraticCurveTo(-tr*.6,-tr*1.4,-tr*.3,-tr*1.3);C.lineTo(-tr*.1,-tr*.8);C.fill();C.restore();
      C.save();C.rotate(.3);C.beginPath();C.moveTo(tr*.25,-tr*.9);C.quadraticCurveTo(tr*.5,-tr*1.5,tr*.35,-tr*1.3);C.lineTo(tr*.15,-tr*.8);C.fill();C.restore();
      // Boss蠕虫触手取代部分炮管
    }

    C.restore();

    // ── 炮管 —— 骨刺/肉管 ──
    C.save();C.rotate(this.dir*Math.PI/2);
    const bl=s*1.3,bw=7;
    // 暗色肉管
    C.fillStyle='#1a0800';C.fillRect(-bw,-s,bw*2,bl);
    // 管纹理——环状收缩
    for(let i=-s+5;i<-s+bl-10;i+=9){
      C.fillStyle='#3a1a08';C.fillRect(-bw-1,i,bw*2+2,3);
      C.fillStyle='#0a0400';C.fillRect(-bw,i+1,bw*2+1,1);
    }
    // 管口——像张开的喉咙
    const mo=-s-2;
    C.fillStyle='#100000';C.beginPath();C.ellipse(0,mo-8,8,4,0,0,Math.PI*2);C.fill();
    C.fillStyle='#300000';C.beginPath();C.ellipse(0,mo-8,5,2.5,0,0,Math.PI*2);C.fill();
    // 管口滴血
    if(Math.sin(this.drip*3)>.5){
      C.fillStyle='#800';C.beginPath();C.arc(2,mo-6,1.5,0,Math.PI*2);C.fill();
    }

    C.restore();

    // ── 标签 ──
    if(this.ib){C.fillStyle='#f40';C.font='bold 12px "Courier New",monospace';C.textAlign='center';C.textBaseline='middle';C.fillText('BOSS',0,0);C.textAlign='start';C.textBaseline='alphabetic'}
    else if(this.ip&&(gm==='double'||gm==='versus'||gm==='boss')){C.fillStyle='#fff';C.font='bold 10px "Courier New",monospace';C.textAlign='center';C.textBaseline='middle';C.fillText('P'+this.pid,0,0);C.textAlign='start';C.textBaseline='alphabetic'}
  }

  _drawBlood(C,tr,eOX,eOY,ny){
    // 从眼窝和嘴角滴下的血迹
    const bt=Math.sin(this.drip*4.5);
    const drops=[
      {x:-eOX+eOX*.4,y:eOY+eOY*.6,sz:2+bt*.5},
      {x:eOX-eOX*.3,y:eOY+eOY*.5,sz:1.5+bt*.4},
      {x:-tr*.2,y:ny+tr*.3,sz:2.5+bt*.7},
      {x:tr*.15,y:ny+tr*.25,sz:2+bt*.6},
    ];
    drops.forEach(d=>{
      if(d.sz<0)return;
      C.fillStyle='#700';C.beginPath();C.arc(d.x,d.y,d.sz,0,Math.PI*2);C.fill();
      C.fillStyle='#a00';C.beginPath();C.arc(d.x,d.y,d.sz*.6,0,Math.PI*2);C.fill();
    });
  }

  _drHP(C){
    const s=this.sz/2,bW=this.sz,bH=this.ib?8:5,bY=-s-14;
    const r=Math.max(0,this.hp/this.mhp);
    C.fillStyle='#1a0000';C.fillRect(this.x-bW/2,this.y+bY,bW,bH);
    const col=r>.5?`rgb(${Math.round(180*(1-r)*2)},20,0)`:r>.25?`rgb(180,${Math.round(40*r*2)},0)`:'rgb(150,0,0)';
    C.fillStyle=col;C.fillRect(this.x-bW/2,this.y+bY,bW*r,bH);
    C.strokeStyle='#500';C.lineWidth=1;C.strokeRect(this.x-bW/2,this.y+bY,bW,bH);
    if(this.ib){C.fillStyle='#f88';C.font='bold 10px "Courier New",monospace';C.textAlign='center';C.fillText(`${this.hp}/${this.mhp}`,this.x,this.y+bY-2);C.textAlign='start'}
  }
}

// ═════════ 游戏状态 ═════════
let gs='title',gm='single';
let scr=0,sP1=0,sP2=0;
let stg=1,wav=1;
let lP1=3,lP2=3;
let ets=0,esp=0;
let tt=0,spt=0;
let rtm={};
let players=[],enemies=[],bullets=[],powerups=[];
let puT=0;
let vsW=0;
let bo=null;
let hiS=parseInt(localStorage.getItem('tHorrorHS')||'0');
let stT=0;

function aT(){const r=[...enemies];if(bo&&bo.a)r.push(bo);for(const p of players)if(p.a)r.push(p);return r}
function aP(){return players.filter(p=>p.a)}
function aE(){return enemies.filter(e=>e.a).length}

function rsG(){
  if(gm==='versus')walls=MPVS.map(r=>[...r]);
  else if(gm==='boss')walls=MPBS.map(r=>[...r]);
  else walls=SMAPS[Math.min(stg-1,MXST-1)].map(r=>[...r]);
  scr=0;sP1=0;sP2=0;wav=1;
  if(gm==='single'){stg=1;lP1=3;lP2=0}else{lP1=3;lP2=3}
  vsW=0;bullets=[];enemies=[];players=[];powerups=[];bo=null;
  pts.length=0;ets=0;esp=0;
  tt=0;spt=0;rtm={};puT=8+Math.random()*7;stT=0;
  spP();
  if(gm==='boss'){spB();gs='playing'}
  else if(gm==='single'){stgS();stT=2;gs='stageIntro'}
  else if(gm!=='versus')stgW();
  else gs='playing'
}

function spP(){
  players=[];
  if(gm==='versus'){
    const s1=PVS[0],p1=new Tk(s1.x,s1.y,s1.d,true,1,3);p1.inv=2;fxS(p1,s1);players.push(p1);
    const s2=PVS[1],p2=new Tk(s2.x,s2.y,s2.d,true,2,3);p2.inv=2;fxS(p2,s2);players.push(p2);return
  }
  const sp1=PSP[0],p1=new Tk(sp1.x,sp1.y,0,true,1,3);p1.inv=2;fxS(p1,sp1);players.push(p1);
  if(gm==='double'||gm==='boss'){const sp2=PSP[1],p2=new Tk(sp2.x,sp2.y,0,true,2,3);p2.inv=2;fxS(p2,sp2);players.push(p2)}
}

function fxS(t,sp){if(t.clAt(sp.x,sp.y))for(let d=1;d<=3;d++)for(let dx=-d;dx<=d;dx++)for(let dy=-d;dy<=d;dy++){const nx=sp.x+dx*CL,ny=sp.y+dy*CL;if(!t.clAt(nx,ny)){t.x=nx;t.y=ny;return}}}

function spB(){bo=new Tk(BSP.x,BSP.y,BSP.d,false,undefined,25,'bs');bo.ib=true;bo.sz=BSZ;bo.spd=BSpd;bo.sd=.35;bo.bsT=3;bo.bsI=0}

function stgS(){
  const inf=SINFO[stg-1];ets=inf.e;esp=0;wav=1;
  spt=1.5;enemies.length=0;
  if(!inf.bo){spt=1;gs='playing'}else{spB();gs='playing'}
}

function stgW(){const inf=SINFO[stg-1];ets=inf.e;esp=0;spt=1;enemies.length=0;gs='playing'}

function spE(){
  const inf=SINFO[stg-1];if(inf.bo)return;
  let et='n';
  if(inf.fa&&inf.hv&&inf.el){const r=Math.random();et=r<.35?'fa':r<.65?'hv':r<.85?'n':'hv'}
  else if(inf.fa&&inf.hv)et=Math.random()<.5?'fa':'hv';
  else if(inf.fa)et=Math.random()<.5?'fa':'n';else if(inf.hv)et=Math.random()<.5?'hv':'n';
  else if(inf.el)et=Math.random()<.35?'hv':'n';
  const hp=et==='hv'?3:1;
  const sp=ESP[Math.floor(Math.random()*ESP.length)];
  const e=new Tk(sp.x,sp.y,2,false,undefined,hp,et);
  // 外观上区分敌人类型——不同敌人用不同颜色(在draw中用et)
  if(!e.clAt(sp.x,sp.y)){enemies.push(e);esp++;return}
  for(const alt of ESP){e.x=alt.x;e.y=alt.y;if(!e.clAt(alt.x,alt.y)){enemies.push(e);esp++;return}}
}

function getNP(x,y){let b=null,bd=Infinity;for(const p of players){if(!p.a)continue;const d=(p.x-x)**2+(p.y-y)**2;if(d<bd){bd=d;b=p}}return b}
function vW(wp){gs='versusEnd';vsW=wp;sfxWin()}
function go(r){gs='gameOver';players=[];enemies.length=0;bullets.length=0;bo=null;sfxGo();if(scr>hiS){hiS=scr;localStorage.setItem('tHorrorHS',hiS)}}

// Boss AI
function uB(dt){
  if(!bo||!bo.a)return;bo.up(dt);if(bo._fz>0)return;
  const tg=getNP(bo.x,bo.y);
  bo.bsT-=dt;const sks=['triple','spread','charge'];
  if(bo.bsT<=0){bo.bsI=(bo.bsI+1)%3;bo.bsT=3+Math.random()*3;bo._sk=sks[bo.bsI];bo._ph=0;bo._tk=0}
  const sk=bo._sk||'charge';
  bo.mt-=dt;
  if(bo.mt<=0){
    if(sk==='charge'&&bo._ph===0&&tg){const dx=tg.x-bo.x,dy=tg.y-bo.y;bo.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0);bo.mt=.1;bo._ph=1;bo._tk=.6}
    else if(tg&&Math.random()<.7){const dx=tg.x-bo.x,dy=tg.y-bo.y;bo.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0);bo.mt=.3+Math.random()*.6}

  }
  const sp=(sk==='charge'&&bo._ph===1)?bo.spd*3*dt:bo.spd*dt;
  if(!bo.tM(DX[bo.dir]*sp,DY[bo.dir]*sp)){bo.dir=Math.floor(Math.random()*4);bo.mt=.2+.4*Math.random()}
  if(sk==='charge'&&bo._ph===1){bo._tk-=dt;if(bo._tk<=0){bo._ph=0}}
  bo.at-=dt;

    if(sk==='triple'){for(let i=0;i<3;i++){setTimeout(()=>{if(bo&&bo.a){const b=bo.sht();if(b)bullets.push(b)}},i*80)}bo.at=.65}
    else if(sk==='spread'){if(tg){const ba=bo.dir*Math.PI/2;for(let a=-.4;a<=.4;a+=.4){const ang=ba+a,ox=Math.cos(ang)*(bo.sz/2+12),oy=Math.sin(ang)*(bo.sz/2+12);bullets.push(sdB(bo.x+ox,bo.y+oy,ang))}}bo.at=.85}
    else{const b=bo.sht();if(b)bullets.push(b);bo.at=.2+.35*Math.random()}
  }
}

function uSB(dt){

}

// ═══════════════ 更新 ═══════════════
function up(dt){
  for(const p of pts)p.up(dt);for(let i=pts.length-1;i>=0;i--)if(!pts[i].a)pts.splice(i,1);
  if(gs==='title'||gs==='gameOver'||gs==='win'||gs==='versusEnd')return;
  if(gs==='stageIntro'){stT-=dt;if(stT<=0){stgS();gs='playing'}return}
  if(gs==='stageComplete'){stT-=dt;if(stT<=0){if(stg>=MXST){gs='win';sfxWin()}else{stg++;walls=SMAPS[stg-1].map(r=>[...r]);rsST();gs='stageIntro';stT=2}}return}
  if(gs==='waveComplete'){tt-=dt;if(tt<=0){wav++;stgW()}for(const b of bullets)b.up(dt);for(let i=bullets.length-1;i>=0;i--)if(!bullets[i].a)bullets.splice(i,1);return}

  for(const[k,t]of Object.entries(rtm)){if(t<=0)continue;rtm[k]-=dt;if(rtm[k]<=0){const pid=parseInt(k);const hl=pid===1?lP1>0:lP2>0;if(hl&&!players.some(p=>p.pid===pid&&p.a)){let sp=(gm==='versus')?PVS[pid===1?0:1]:PSP[pid===1?0:1];const p=new Tk(sp.x,sp.y,sp.d||0,true,pid,3);fxS(p,sp);p.inv=2;players.push(p)}}}

  for(const p of players){if(!p.a)continue;p.up(dt);const d=gDir(p.pid);if(d>=0){p.dir=d;p.tM(DX[d]*p.eSpd*dt,DY[d]*p.eSpd*dt)}if(gSht(p.pid)){const b=p.sht();if(b){bullets.push(b);sfxS()}}}

  if((gm==='boss'||(gm==='single'&&SINFO[stg-1]?.bo))&&bo&&bo.a)uB(dt);

  if(gm!=='versus'&&gm!=='boss'&&!SINFO[stg-1]?.bo){
    for(const e of enemies){if(!e.a)continue;if(e._fz>0){e.up(dt);continue}e.up(dt);e.mt-=dt;
      if(e.mt<=0){let nd;const tgt=getNP(e.x,e.y);if(tgt&&Math.random()<.35){const dx=tgt.x-e.x,dy=tgt.y-e.y;nd=Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0)}else nd=Math.floor(Math.random()*4);e.dir=nd;e.mt=.35+Math.random()*1.2}
      if(!e.tM(DX[e.dir]*e.spd*dt,DY[e.dir]*e.spd*dt)){e.dir=Math.floor(Math.random()*4);e.mt=.2+.5*Math.random()}
      e.at-=dt;if(e.at<=0){const b=e.sht();if(b)bullets.push(b);e.at=.6+Math.random()*1.6}}
  }

  uSB(dt);for(const b of bullets){if(b._sa===undefined&&b.a)b.up(dt)}

  for(const b of bullets){if(!b.a)continue;
    if(typeof b.ow==='number'){if(gm==='versus'){const tp=b.ow===1?2:1;const tgt=players.find(p=>p.pid===tp&&p.a);if(tgt&&Math.abs(b.x-tgt.x)<TS/2&&Math.abs(b.y-tgt.y)<TS/2){b.a=false;tgt.hp--;sBl(tgt.x,tgt.y);sSm(tgt.x,tgt.y,5);if(tgt.hp<=0){sEx(tgt.x,tgt.y,18);sfxEx();if(b.ow===1)sP1++;else sP2++;kP(tgt)}else sfxH();continue}
      else{for(const e of enemies){if(!e.a)continue;if(Math.abs(b.x-e.x)<TS/2&&Math.abs(b.y-e.y)<TS/2){b.a=false;e.hp--;sBl(e.x,e.y);sSm(e.x,e.y,5);if(e.hp<=0){e.a=false;sEx(e.x,e.y,18);sfxEx();scr+=100}else sfxH();break}}
        if(bo&&bo.a&&Math.abs(b.x-bo.x)<BSZ/2&&Math.abs(b.y-bo.y)<BSZ/2){b.a=false;bo.hp--;sBl(bo.x,bo.y);sSm(bo.x,bo.y,10);sfxH();if(bo.hp<=0){bo.a=false;sEx(bo.x,bo.y,50);sfxEx();scr+=1000;sP1+=5;sP2+=5;setTimeout(()=>{if(gs==='playing'){if(gm==='single'&&SINFO[stg-1]?.bo){stCl()}else{gs='win';sfxWin()}}},700)}}}}
    else if(b.ow==='enemy'||b.ow==='boss'){for(const p of players){if(!p.a||p.inv>0)continue;if(Math.abs(b.x-p.x)<TS/2&&Math.abs(b.y-p.y)<TS/2){b.a=false;p.hp--;sBl(p.x,p.y);sSm(p.x,p.y,5);if(p.hp<=0){sEx(p.x,p.y,20);sfxEx();kP(p)}else sfxH()}}}
  }

  for(let i=bullets.length-1;i>=0;i--)if(!bullets[i].a)bullets.splice(i,1);
  for(let i=enemies.length-1;i>=0;i--)if(!enemies[i].a)enemies.splice(i,1);

  if(gm!=='versus'){puT-=dt;if(puT<=0&&powerups.length<3){const pu=rPU();if(pu)powerups.push(pu);puT=6+Math.random()*7}for(const pu of powerups)pu.up(dt);for(let i=powerups.length-1;i>=0;i--)if(!powerups[i].a)powerups.splice(i,1);for(const pu of powerups)for(const p of players){if(!p.a)continue;if(Math.abs(p.x-pu.x)<TS/2+22&&Math.abs(p.y-pu.y)<TS/2+22){aPU(p,pu.tp);pu.a=false}}}

  if(gm!=='versus'&&gm!=='boss'){if(!SINFO[stg-1]?.bo){const inf=SINFO[stg-1];if(esp<ets&&aE()+enemies.length<6){spt-=dt;if(spt<=0){spE();spt=1+Math.random()*1.2}}if(esp>=ets&&aE()===0&&gs==='playing'){if(wav<inf.w){gs='waveComplete';tt=1.2;sfxWv()}else{stCl()}}}}}
}

function stCl(){if(stg>=MXST){gs='win';sfxWin();return}gs='stageComplete';stT=2.5;sfxWv()}

function kP(p){p.a=false;players=players.filter(pp=>pp.a);const pid=p.pid;if(pid===1)lP1--;else lP2--;const aa=aP().length>0;
  if(gm==='versus'){if(lP1<=0&&(!aa||lP2>0)){vW(2);return}if(lP2<=0&&(!aa||lP1>0)){vW(1);return}if(!aa&&lP1<=0){vW(2);return}if(!aa&&lP2<=0){vW(1);return}}
  else if(gm==='single'){if(!aa&&lP1<=0){go('lives');return}}

// ═══════════════ 渲染 ═══════════════
function cX(c){return GX+c*CL}function cY(r){return GY+r*CL}
function getC(x,y){const c=Math.floor((x-GX)/CL),r=Math.floor((y-GY)/CL);if(c<0||c>=CLS||r<0||r>=RWS)return null;if(walls[r][c]===0)return null;return{row:r,col:c,value:walls[r][c]}}

function drM(){
  for(let r=0;r<RWS;r++)for(let c=0;c<CLS;c++){
    const x=cX(c),y=cY(r),v=walls[r][c];
    if(v===1){ // 砖墙——暗红带黑色纹理
      C.fillStyle='#2a0d08';C.fillRect(x,y,CL,CL);
      C.fillStyle='#1a0603';C.fillRect(x+4,y+4,CL-8,CL-8);
      C.fillStyle='#3a1008';C.fillRect(x+8,y+8,CL-16,CL-16);
      C.strokeStyle='#4a1508';C.lineWidth=1;
      for(let i=1;i<3;i++){C.beginPath();C.moveTo(x,y+i*CL/3);C.lineTo(x+CL,y+i*CL/3);C.stroke()}
      for(let i=1;i<3;i++){C.beginPath();C.moveTo(x+i*CL/3,y);C.lineTo(x+i*CL/3,y+CL/3);C.stroke();C.beginPath();C.moveTo(x+(i-.5)*CL/3,y+CL/3);C.lineTo(x+(i-.5)*CL/3,y+2*CL/3);C.stroke();C.beginPath();C.moveTo(x+i*CL/3,y+2*CL/3);C.lineTo(x+i*CL/3,y+CL);C.stroke()}
    }else if(v===2){ // 钢墙——黑曜石
      C.fillStyle='#0a0a15';C.fillRect(x,y,CL,CL);
      C.fillStyle='#15152a';C.fillRect(x+3,y+3,CL-6,CL-6);
      C.fillStyle='#08081a';C.fillRect(x+8,y+8,CL-16,CL-16);
      C.strokeStyle='#2a2a4a';C.lineWidth=2;C.strokeRect(x+2,y+2,CL-4,CL-4);
    }else if(v===3||v===4){ // 基地
      const ip2=v===4,bc=ip2?'#120820':'#1a0600',bdc=ip2?'#281848':'#500';
      const lb=ip2?'P2':(gm==='versus'?'P1':'HQ');
      C.fillStyle=bc;C.fillRect(x,y,CL,CL);
      C.strokeStyle=bdc;C.lineWidth=3;C.strokeRect(x+2,y+2,CL-4,CL-4);
      C.fillStyle='#0a0a0a';C.fillRect(x+CL/2-2,y+8,4,CL-16);
      C.fillStyle=ip2?'#334':'#700';C.beginPath();C.moveTo(x+CL/2+2,y+10);C.lineTo(x+CL/2+20,y+20);C.lineTo(x+CL/2+2,y+30);C.fill();
      C.fillStyle='#fff';C.font='bold 13px "Courier New",monospace';C.textAlign='center';C.fillText(lb,x+CL/2,y+12);C.textAlign='start'
    }
  }
}

  C.fillStyle='#f44';C.font='bold 28px "Courier New",monospace';C.textAlign='center';C.fillText(inf.n,$.width/2,295);C.textAlign='start';
  C.fillStyle='#aaa';C.font='15px "Courier New",monospace';C.textAlign='center';C.fillText(inf.d,$.width/2,335);C.textAlign='start';
  if(!inf.bo){C.fillStyle='#f66';C.font='13px "Courier New",monospace';C.textAlign='center';C.fillText(`敌军: ${inf.e}×${inf.w}波  |  难度: ${stg}/10`,$.width/2,368);C.textAlign='start'}
  else{C.fillStyle='#f20';C.font='bold 16px "Courier New",monospace';C.textAlign='center';C.fillText('⚠ 最终BOSS · 地狱领主 ⚠',$.width/2,368);C.textAlign='start'}
}

function rdr(){
  drBg();drGd();drM();
  for(const p of pts)p.dr(C);
  for(const pu of powerups)pu.dr(C);
  for(const b of bullets)b.dr(C);
  for(const e of enemies)e.dr(C);
  if(bo&&bo.a)bo.dr(C);
  for(const p of players)p.dr(C);
  drUI();
  if(gs==='title')drT();
  else if(gs==='gameOver')drGO();
  else if(gs==='win')drWin();
  else if(gs==='versusEnd')drVS();
  else if(gs==='stageIntro')drSI();
  else if(gs==='waveComplete'){C.fillStyle='#fff';C.font='bold 28px "Courier New",monospace';C.textAlign='center';C.fillText(`第 ${wav} 波清除`,$.width/2,$.height/2);C.textAlign='start'}
  else if(gs==='stageComplete'){C.fillStyle='#fd0';C.font='bold 36px "Courier New",monospace';C.textAlign='center';C.fillText(`第 ${stg} 关通过`,$.width/2,$.height/2);C.textAlign='start'}
}

// ═══════════════ 主循环 ═══════════════
let lt=0;
function lp(ts){
  const dt=Math.min((ts-lt)/1000,.05);lt=ts;
  if(keys.enter){keys.enter=false;if(gs==='title'||gs==='gameOver'||gs==='win'||gs==='versusEnd')rsG()}
  if(gs==='title'){if(keys['1']){keys['1']=false;gm='single'}if(keys['2']){keys['2']=false;gm='double'}if(keys['3']){keys['3']=false;gm='versus'}if(keys['4']){keys['4']=false;gm='boss'}}
  up(dt);rdr();requestAnimationFrame(lp)
}

gm='single';rsG();gs='title';
requestAnimationFrame(lp);
</script>
</body>
</html>
